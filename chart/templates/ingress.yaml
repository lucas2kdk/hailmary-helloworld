{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "hello-world.fullname" . }}
  labels:
    {{- include "hello-world.labels" . | nindent 4 }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  defaultBackend:
    service:
      name: {{ include "hello-world.fullname" . }}
      port:
        number: {{ .Values.service.port }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
{{- end }}
